name: Deploy Boels CORE to Antagonist

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & FTP deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, gd, zip, bcmath, fileinfo
          tools: composer:v2
          coverage: none

      # Dummy .env zodat artisan-commands in post-install-scripts niet falen
      - name: Create dummy .env for build
        run: cp .env.example .env

      - name: Install PHP dependencies (no scripts during install)
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Remove build-only .env (server has its own)
        run: rm -f .env

      - name: Prepare artisan permissions
        run: chmod +x artisan

      # ============ DEPLOY STEP 1 ============
      # Upload de Laravel applicatie (vendor/, app/, config/, ...) naar
      # /domains/sorai.nl/databasehub_laravel/  (BUITEN de webroot)
      - name: Deploy Laravel app to /databasehub_laravel/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: /domains/sorai.nl/databasehub_laravel/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.DS_Store
            **/docs/**
            public/**
            .env
            .env.*
            README.md

      # ============ DEPLOY STEP 2 ============
      # Upload public/ naar de webroot
      - name: Deploy public/ to webroot
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: /domains/sorai.nl/public_html/databasehub/
          local-dir: ./public/
          exclude: |
            **/.DS_Store
